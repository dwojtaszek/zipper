project: Zipper
imagemagick: true
environments: {}

default_target: local

auth:
  method: none
  provider: none

personas:
  - name: operator
    description: 'Runs the CLI with various argument combinations to generate test data'
    email: null
    credentials_source: none
    test_focus:
      - standard-archive-generation
      - loadfile-only-generation
      - production-set-generation
      - benchmark-mode
      - chaos-engine
      - argument-validation
      - error-handling
    cannot_do: []

apps:
  cli:
    path_patterns:
      - 'src/**'
      - 'tests/**'
    skill: qa-cli
    test_tool: curl
    build_command: 'dotnet publish src/Zipper.csproj -c Release -o publish-bin'

feature_flags:
  provider: none
  dashboard_url: null
  how_to_override: null

integrations: {}

cleanup:
  auto_cleanup: true
  strategy: delete-test-output
  instructions: 'Delete the test output directory after each test run. The E2E scripts use ./results/ by default; clean up with rm -rf ./results or the test-specific output-path.'

failure_learning: auto_commit
