name: PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Opt-in to Node.js 24 for JS-based actions that still default to Node 20.
  # See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  docs-only:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      only_docs: ${{ steps.check.outputs.only_docs }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: check
        shell: bash
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"

          # Step 1: fetch the list of changed files; propagate a genuine
          # `git diff` failure (missing SHA, corrupt object, etc.) so we
          # never silently declare a failed diff as "docs-only".
          files=$(git diff --name-only "$base" "$head")

          if [[ -z "$files" ]]; then
            echo "No files changed between $base and $head; treating as non-docs to be safe."
            echo "only_docs=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Step 2: every changed file must match a docs pattern to qualify
          # as docs-only. Count matches explicitly (no `|| true` masking).
          total=$(printf '%s\n' "$files" | grep -c . || true)
          docs=$(printf '%s\n' "$files" \
              | grep -c -E '(^|/)(docs/|CHANGELOG\.md$|.*\.(md|txt)$)' || true)

          if [[ "$total" -gt 0 && "$docs" -eq "$total" ]]; then
            echo "Docs-only PR detected ($total files, all docs); skipping build and tests."
            echo "only_docs=true" >> "$GITHUB_OUTPUT"
          else
            echo "Non-docs change detected ($docs of $total files are docs); running full PR pipeline."
            echo "only_docs=false" >> "$GITHUB_OUTPUT"
          fi

  # Note: the previously-separate `validate-agents-md` job was folded in (#397).
  # Its checks (restore, build, format, test) are fully covered by `lint`
  # (restore + format) and `build-and-test` (restore + build + test), so a
  # dedicated job was redundant CI minutes.
  lint:
    needs: docs-only
    if: needs.docs-only.outputs.only_docs != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: eifinger/actionlint-action@1fc89649be682d16ec5cf65ea16e269eb88d3982 # v1.10.2
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'
      - name: Restore (locked)
        run: dotnet restore zipper.sln --locked-mode
      - name: Lint code style
        run: dotnet format --verify-no-changes --no-restore
      - name: Check for oversized files
        shell: bash
        run: |
          set -euo pipefail
          MAX_BYTES=$((500 * 1024))  # 500 KB
          oversized=$(find src -type f -size +${MAX_BYTES}c -not -name '*.json' -not -name '*.dat' -not -name '*.opt' 2>/dev/null || true)
          if [[ -n "$oversized" ]]; then
            echo "ERROR: Files exceeding ${MAX_BYTES} bytes found:" >&2
            echo "$oversized" >&2
            exit 1
          fi
          echo "No oversized files detected (limit: ${MAX_BYTES} bytes)."

  build-and-test:
    needs: [docs-only, lint]
    if: needs.docs-only.outputs.only_docs != 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            coverage: true
          - os: windows-latest
            platform: win-x64
            coverage: false
          - os: macos-latest
            platform: osx-arm64
            coverage: false

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore (locked)
        run: dotnet restore zipper.sln --locked-mode

      - name: Build (Release, includes tests)
        run: dotnet build zipper.sln -c Release --no-restore

      # Unit tests + coverage on Linux only (single pass with the coverage collector).
      - name: Unit tests + coverage (Linux)
        if: matrix.coverage == true
        run: |
          dotnet test src/Zipper.Tests/Zipper.Tests.csproj \
            -c Release --no-build \
            --logger "console;verbosity=normal" \
            --logger "junit;LogFilePath=TestResults/test-results.xml" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      - name: Check for deprecated/vulnerable NuGet packages (Linux)
        if: matrix.coverage == true
        shell: bash
        run: |
          set -euo pipefail
          # `--unused` is not a valid `dotnet list package` option (it was a
          # silent no-op masked by `|| true`). Use the real checks instead.
          #
          # Deprecated: informational only — xunit v2 is flagged "Legacy" by
          # design, which would otherwise break every build.
          echo "::group::Deprecated packages (informational)"
          dotnet list package --deprecated --include-transitive
          echo "::endgroup::"
          # Vulnerable: hard gate. The tool prints finding rows prefixed with
          # `>`; a clean project prints "has no vulnerable packages".
          vuln=$(dotnet list package --vulnerable --include-transitive)
          echo "$vuln"
          if echo "$vuln" | grep -qE '^[[:space:]]*>'; then
            echo "ERROR: vulnerable packages detected." >&2
            exit 1
          fi
          echo "No vulnerable packages detected."

      - name: Test timing report (Linux)
        if: matrix.coverage == true
        run: |
          if [[ -f TestResults/test-results.xml ]]; then
            python3 -c "from textwrap import dedent; exec(dedent('''
            import xml.etree.ElementTree as ET
            tree = ET.parse('TestResults/test-results.xml')
            tests = [(t.get('classname',''), t.get('name',''), float(t.get('time',0))) for t in tree.iter() if t.tag == 'testcase' and float(t.get('time',0)) > 0.5]
            tests.sort(key=lambda x: -x[2])
            print('Slowest tests (>0.5s):')
            for cls, name, secs in tests[:20]:
                print(f'  {secs:.2f}s  {cls}.{name}')
            if not tests:
                print('All tests under 0.5s')
            '''))"
          fi

      - name: Coverage report + 80% gate (Linux)
        if: matrix.coverage == true
        uses: ./.github/actions/coverage-gate

      - name: Unit tests (non-Linux)
        if: matrix.coverage != true
        run: dotnet test src/Zipper.Tests/Zipper.Tests.csproj -c Release --no-build --logger "console;verbosity=normal"

      - name: Run full E2E suite (same as main CI)
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            ./tests/run-tests.bat
          else
            bash ./tests/run-tests.sh
          fi

      # Publish the CLI once on Linux and hand it to the `goldens` job as an
      # artifact, so goldens does not re-restore + re-publish (#397).
      - name: Publish CLI for goldens (Linux)
        if: matrix.coverage == true
        run: dotnet publish src/Zipper.csproj -c Release -o ./publish-bin --no-restore

      - name: Upload CLI artifact for goldens (Linux)
        if: matrix.coverage == true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: zipper-cli-linux
          path: publish-bin/
          retention-days: 1

  goldens:
    needs: [docs-only, build-and-test]
    if: needs.docs-only.outputs.only_docs != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      # Runtime only — the binary is framework-dependent; no restore/build here.
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          global-json-file: global.json

      - name: Download CLI artifact (built by the Linux build-and-test leg)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: zipper-cli-linux
          path: publish-bin

      - name: Run golden scenarios
        run: |
          chmod +x ./publish-bin/Zipper ./tests/goldens/run-goldens.sh
          ZIPPER_CLI="$(pwd)/publish-bin/Zipper" bash ./tests/goldens/run-goldens.sh

