name: PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docs-only:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      only_docs: ${{ steps.check.outputs.only_docs }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: check
        shell: bash
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          changed=$(git diff --name-only "$base" "$head" | grep -v -E '\.(md|txt)$' | grep -v '^docs/' || true)
          if [ -z "$changed" ]; then
            echo "Docs-only PR detected; skipping build and tests."
            echo "only_docs=true" >> "$GITHUB_OUTPUT"
          else
            echo "only_docs=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    needs: docs-only
    if: needs.docs-only.outputs.only_docs != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: '**/packages.lock.json'
      - name: Restore
        run: dotnet restore zipper.sln
      - name: Lint code style
        run: dotnet format --verify-no-changes --no-restore

  build-and-test:
    needs: [docs-only, lint]
    if: needs.docs-only.outputs.only_docs != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore
        run: dotnet restore zipper.sln

      - name: Build (Release, includes tests)
        run: dotnet build zipper.sln -c Release --no-restore

      - name: Unit tests + coverage (single pass)
        run: |
          dotnet test src/Zipper.Tests/Zipper.Tests.csproj \
            -c Release --no-build \
            --logger "console;verbosity=normal" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      - name: Cache reportgenerator tool
        uses: actions/cache@v5.0.5
        with:
          path: ~/.dotnet/tools
          key: ${{ runner.os }}-reportgen-${{ hashFiles('.config/dotnet-tools.json') }}
          restore-keys: ${{ runner.os }}-reportgen-

      - name: Coverage report + 80% gate
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          if ! command -v reportgenerator >/dev/null 2>&1; then
            dotnet tool install --global dotnet-reportgenerator-globaltool
          fi
          reportgenerator \
            -reports:TestResults/*/coverage.cobertura.xml \
            -targetdir:TestResults/coverage-report \
            -reporttypes:"Html;TextSummary"
          cat TestResults/coverage-report/Summary.txt
          COVERAGE=$(grep "Line coverage:" TestResults/coverage-report/Summary.txt | grep -oP '\d+(\.\d+)?%' | head -1 | sed 's/%//')
          echo "Coverage: ${COVERAGE}%"
          awk -v c="$COVERAGE" 'BEGIN { exit (c+0 < 80) ? 1 : 0 }' || {
            echo "ERROR: coverage ${COVERAGE}% < 80%"
            exit 1
          }

      - name: Publish self-contained (linux-x64) for E2E
        run: |
          dotnet publish src/Zipper.csproj -c Release -r linux-x64 \
            --self-contained true -o publish/linux-x64 --no-restore
          rm -f publish/linux-x64/*.pdb

      - name: Run basic E2E smoke suite
        run: |
          chmod +x ./tests/run-e2e-basic.sh
          ./tests/run-e2e-basic.sh
