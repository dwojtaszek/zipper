name: Droid Auto Review

on:
  pull_request:
    types: [opened, ready_for_review, reopened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # Opt-in to Node.js 24 for JS-based actions that still default to Node 20.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  droid-review:
    if: >
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    # Non-blocking: review is informational and can run 10-20 min. A failure or
    # timeout here must not fail the whole workflow / gate PR merges.
    continue-on-error: true
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Run Droid Auto Review
        continue-on-error: true
        uses: Factory-AI/droid-action@e3d1f5e7861c36fe4a9c4dca3edec87b964b2bc4  # v5
        with:
          factory_api_key: ${{ secrets.FACTORY_API_KEY }}
          automatic_review: true
          automatic_security_review: true
          review_depth: shallow
          # Open-source GLM-5.1 — cheapest option for shallow review.
          review_model: glm-5.1
          reasoning_effort: medium
