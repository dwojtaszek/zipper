name: Build and Test

on:
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Opt-in to Node.js 24 for JS-based actions that still default to Node 20.
  # See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set Version
        id: version
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "Version from tag: $VERSION"
          else
            LATEST_TAG=$(git tag -l 'v*' | sort -V | tail -1)
            if [[ -z "$LATEST_TAG" ]]; then
              LATEST_TAG="v0.0.0"
            fi
            BASE=${LATEST_TAG#v}
            IFS='.' read -r major minor patch <<< "$BASE"
            NEW_PATCH=$((patch + 1))
            VERSION="$major.$minor.$NEW_PATCH-dev"
            echo "Version from bump: $VERSION (latest tag: $LATEST_TAG)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  lint:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'
      - name: Restore (locked)
        run: dotnet restore zipper.sln --locked-mode
      - name: Lint code style
        run: dotnet format --verify-no-changes --no-restore

  build-and-test:
    needs: [prepare, lint]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: windows-latest
            platform: win-x64
          - os: macos-latest
            platform: osx-arm64

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore (locked)
        run: dotnet restore zipper.sln --locked-mode

      - name: Build solution (Release, includes tests)
        run: dotnet build zipper.sln -c Release --no-restore

      # Unit tests (Linux: with coverage + 80% gate; other OS: plain run)
      - name: Unit tests + coverage (Linux)
        if: runner.os == 'Linux'
        run: |
          dotnet test src/Zipper.Tests/Zipper.Tests.csproj \
            -c Release --no-build \
            --logger "console;verbosity=normal" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      - name: Coverage report + 80% gate (Linux)
        if: runner.os == 'Linux'
        uses: ./.github/actions/coverage-gate

      - name: Unit tests (non-Linux)
        if: runner.os != 'Linux'
        run: dotnet test src/Zipper.Tests/Zipper.Tests.csproj -c Release --no-build --logger "console;verbosity=normal"

      # Publish self-contained per platform
      - name: Publish self-contained binary
        shell: bash
        run: |
          dotnet publish src/Zipper.csproj -c Release -r ${{ matrix.platform }} \
            --self-contained true -o publish/${{ matrix.platform }} \
            -p:Version=${{ needs.prepare.outputs.version }} --no-restore
          rm -f publish/${{ matrix.platform }}/*.pdb

          case "${{ matrix.platform }}" in
            win-x64)   mv publish/${{ matrix.platform }}/Zipper.exe publish/${{ matrix.platform }}/zipper-win-x64.exe ;;
            linux-x64) mv publish/${{ matrix.platform }}/Zipper     publish/${{ matrix.platform }}/zipper-linux-x64 ;;
            osx-arm64) mv publish/${{ matrix.platform }}/Zipper     publish/${{ matrix.platform }}/zipper-osx-arm64 ;;
          esac

      # Full E2E suite runs on every OS (no shortcuts)
      - name: Run full E2E suite
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            ./tests/run-tests.bat
          else
            bash ./tests/run-tests.sh
          fi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: zipper-${{ matrix.platform }}
          path: publish/${{ matrix.platform }}
          retention-days: 7

  tag-and-release:
    needs: [prepare, lint, build-and-test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]')
    permissions:
      contents: write
      pull-requests: read
      models: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts

      - name: Bump and Tag
        id: tag_step
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          LATEST_TAG=$(git tag -l 'v*' | sort -V | tail -1)
          if [[ -z "$LATEST_TAG" ]]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "Latest tag: $LATEST_TAG"

          VERSION=${LATEST_TAG#v}
          IFS='.' read -r major minor patch <<< "$VERSION"

          if [[ -z "$major" || -z "$minor" || -z "$patch" ]]; then
             echo "Could not parse version: $VERSION"
             major=0
             minor=0
             patch=0
          fi

          NEW_PATCH=$((patch + 1))
          NEW_TAG="v$major.$minor.$NEW_PATCH"

          echo "New tag: $NEW_TAG"

          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag $NEW_TAG already exists, skipping"
            exit 0
          fi

          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Generate Release Notes
        id: release_notes
        if: steps.tag_step.outputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -eo pipefail

          # Fetch PR body for this merge commit via API; content stays in a shell
          # variable — never interpolated into shell expressions (injection guard).
          gh api "repos/${REPO}/commits/${COMMIT_SHA}/pulls" \
            --jq '(.[0] // {}) | .body // ""' > /tmp/pr_body.txt 2>/dev/null || true

          # Extract ## Release Notes section (stop at next ## heading or EOF).
          # PR body is untrusted; we only pipe it through text tools, never eval it.
          NOTES=$(awk '
            /^## Release Notes/ { found=1; next }
            found && /^## /     { exit }
            found               { print }
          ' /tmp/pr_body.txt | grep -Ev "^[[:space:]]*(<!--|-->)" |
            sed '/^[[:space:]]*$/d' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' || true)

          write_output() {
            local content="$1"
            # Use a random delimiter to prevent injection via content containing "EOF"
            local delim
            delim=$(openssl rand -hex 16)
            printf 'body<<%s\n%s\n%s\n' "$delim" "$content" "$delim" >> "$GITHUB_OUTPUT"
          }

          if [[ -n "$NOTES" && "$NOTES" != "_Auto-generated by CI._" ]]; then
            write_output "$NOTES"
            exit 0
          fi

          # Fallback: GitHub Models API — commit log as input, never user-controlled.
          PREV_TAG=$(git tag -l 'v*' | sort -V | tail -2 | head -1 || true)
          [[ -z "$PREV_TAG" ]] && PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          export COMMIT_LOG
          COMMIT_LOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" | head -50 || true)

          # Python reads COMMIT_LOG and GH_TOKEN from env — no shell interpolation.
          GENERATED=$(python3 -c '
import json, urllib.request, os, sys
cl = os.environ.get("COMMIT_LOG", "")
p = ("Summarize these git commits as 1-3 plain prose sentences for a developer "
     "changelog. Key facts only. No fluff. No marketing language.\n\nCommits:\n") + cl
d = json.dumps({"model": "openai/gpt-4o-mini",
                "messages": [{"role": "user", "content": p}],
                "max_tokens": 200}).encode()
req = urllib.request.Request(
    "https://models.github.ai/inference/chat/completions", data=d,
    headers={"Authorization": "Bearer " + os.environ["GH_TOKEN"],
             "Content-Type": "application/json"})
try:
    with urllib.request.urlopen(req, timeout=30) as resp:
        print(json.loads(resp.read())["choices"][0]["message"]["content"])
except Exception as e:
    print(str(e), file=sys.stderr)
    sys.exit(1)
' 2>/dev/null || true)

          write_output "${GENERATED:-See commit history for changes in this release.}"

      - name: Create Release
        if: steps.tag_step.outputs.tag != ''
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag_step.outputs.tag }}
          name: Release ${{ steps.tag_step.outputs.tag }}
          body: ${{ steps.release_notes.outputs.body }}
          draft: false
          prerelease: false
          files: |
            artifacts/zipper-win-x64/zipper-win-x64.exe
            artifacts/zipper-linux-x64/zipper-linux-x64
            artifacts/zipper-osx-arm64/zipper-osx-arm64
