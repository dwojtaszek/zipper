name: Build and Test

on:
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Opt-in to Node.js 24 for JS-based actions that still default to Node 20.
  # See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set Version
        id: version
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "Version from tag: $VERSION"
          else
            LATEST_TAG=$(git tag -l 'v*' | sort -V | tail -1)
            if [[ -z "$LATEST_TAG" ]]; then
              LATEST_TAG="v0.0.0"
            fi
            BASE=${LATEST_TAG#v}
            IFS='.' read -r major minor patch <<< "$BASE"
            NEW_PATCH=$((patch + 1))
            VERSION="$major.$minor.$NEW_PATCH-dev"
            echo "Version from bump: $VERSION (latest tag: $LATEST_TAG)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  lint:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'
      - name: Restore (locked)
        run: dotnet restore zipper.sln --locked-mode
      - name: Lint code style
        run: dotnet format --verify-no-changes --no-restore

  build-and-test:
    needs: [prepare, lint]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: windows-latest
            platform: win-x64
          - os: macos-latest
            platform: osx-arm64

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore (locked)
        run: dotnet restore zipper.sln --locked-mode

      - name: Build solution (Release, includes tests)
        run: dotnet build zipper.sln -c Release --no-restore

      # Unit tests (Linux: with coverage + 80% gate; other OS: plain run)
      - name: Unit tests + coverage (Linux)
        if: runner.os == 'Linux'
        run: |
          dotnet test src/Zipper.Tests/Zipper.Tests.csproj \
            -c Release --no-build \
            --logger "console;verbosity=normal" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      - name: Cache reportgenerator tool (Linux)
        if: runner.os == 'Linux'
        uses: actions/cache@v5.0.5
        with:
          # dotnet tool restore installs into the per-repo tool home.
          path: .dotnet-tools
          key: ${{ runner.os }}-reportgen-${{ hashFiles('.config/dotnet-tools.json') }}
          restore-keys: ${{ runner.os }}-reportgen-

      - name: Coverage report + 80% gate (Linux)
        if: runner.os == 'Linux'
        env:
          DOTNET_CLI_HOME: ${{ github.workspace }}/.dotnet-tools
        run: |
          dotnet tool restore
          dotnet reportgenerator \
            -reports:TestResults/*/coverage.cobertura.xml \
            -targetdir:TestResults/coverage-report \
            -reporttypes:"Html;TextSummary"
          cat TestResults/coverage-report/Summary.txt
          COVERAGE=$(grep "Line coverage:" TestResults/coverage-report/Summary.txt | grep -oP '\d+(\.\d+)?%' | head -1 | sed 's/%//')
          echo "Coverage: ${COVERAGE}%"
          awk -v c="$COVERAGE" 'BEGIN { exit (c+0 < 80) ? 1 : 0 }' || {
            echo "ERROR: coverage ${COVERAGE}% < 80%"
            exit 1
          }

      - name: Unit tests (non-Linux)
        if: runner.os != 'Linux'
        run: dotnet test src/Zipper.Tests/Zipper.Tests.csproj -c Release --no-build --logger "console;verbosity=normal"

      # Publish self-contained per platform
      - name: Publish self-contained binary
        shell: bash
        run: |
          dotnet publish src/Zipper.csproj -c Release -r ${{ matrix.platform }} \
            --self-contained true -o publish/${{ matrix.platform }} \
            -p:Version=${{ needs.prepare.outputs.version }} --no-restore
          rm -f publish/${{ matrix.platform }}/*.pdb

          case "${{ matrix.platform }}" in
            win-x64)   mv publish/${{ matrix.platform }}/Zipper.exe publish/${{ matrix.platform }}/zipper-win-x64.exe ;;
            linux-x64) mv publish/${{ matrix.platform }}/Zipper     publish/${{ matrix.platform }}/zipper-linux-x64 ;;
            osx-arm64) mv publish/${{ matrix.platform }}/Zipper     publish/${{ matrix.platform }}/zipper-osx-arm64 ;;
          esac

      # Full E2E suite runs on every OS (no shortcuts)
      - name: Run full E2E suite
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            ./tests/run-tests.bat
          else
            bash ./tests/run-tests.sh
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: zipper-${{ matrix.platform }}
          path: publish/${{ matrix.platform }}
          retention-days: 7

  tag-and-release:
    needs: [prepare, lint, build-and-test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Bump and Tag
        id: tag_step
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          LATEST_TAG=$(git tag -l 'v*' | sort -V | tail -1)
          if [[ -z "$LATEST_TAG" ]]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "Latest tag: $LATEST_TAG"

          VERSION=${LATEST_TAG#v}
          IFS='.' read -r major minor patch <<< "$VERSION"

          if [[ -z "$major" || -z "$minor" || -z "$patch" ]]; then
             echo "Could not parse version: $VERSION"
             major=0
             minor=0
             patch=0
          fi

          NEW_PATCH=$((patch + 1))
          NEW_TAG="v$major.$minor.$NEW_PATCH"

          echo "New tag: $NEW_TAG"

          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag $NEW_TAG already exists, skipping"
            exit 0
          fi

          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Create Release
        if: steps.tag_step.outputs.tag != ''
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag_step.outputs.tag }}
          name: Release ${{ steps.tag_step.outputs.tag }}
          draft: false
          prerelease: false
          files: |
            artifacts/zipper-win-x64/zipper-win-x64.exe
            artifacts/zipper-linux-x64/zipper-linux-x64
            artifacts/zipper-osx-arm64/zipper-osx-arm64
