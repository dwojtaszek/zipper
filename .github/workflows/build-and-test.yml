name: Build and Test

on:
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Opt-in to Node.js 24 for JS-based actions that still default to Node 20.
  # See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set Version
        id: version
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "Version from tag: $VERSION"
          else
            LATEST_TAG=$(git tag -l 'v*' | sort -V | tail -1)
            if [[ -z "$LATEST_TAG" ]]; then
              LATEST_TAG="v0.0.0"
            fi
            BASE=${LATEST_TAG#v}
            IFS='.' read -r major minor patch <<< "$BASE"
            NEW_PATCH=$((patch + 1))
            VERSION="$major.$minor.$NEW_PATCH-dev"
            echo "Version from bump: $VERSION (latest tag: $LATEST_TAG)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  lint:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'
      - name: Restore (locked)
        run: dotnet restore zipper.sln --locked-mode
      - name: Lint code style
        run: dotnet format --verify-no-changes --no-restore

  build-and-test:
    needs: [prepare, lint]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: windows-latest
            platform: win-x64
          - os: macos-latest
            platform: osx-arm64

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore (locked)
        run: dotnet restore zipper.sln --locked-mode

      - name: Build solution (Release, includes tests)
        run: dotnet build zipper.sln -c Release --no-restore

      # Unit tests (Linux: with coverage + 80% gate; other OS: plain run)
      - name: Unit tests + coverage (Linux)
        if: runner.os == 'Linux'
        run: |
          dotnet test src/Zipper.Tests/Zipper.Tests.csproj \
            -c Release --no-build \
            --logger "console;verbosity=normal" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      - name: Coverage report + 80% gate (Linux)
        if: runner.os == 'Linux'
        uses: ./.github/actions/coverage-gate

      - name: Unit tests (non-Linux)
        if: runner.os != 'Linux'
        run: dotnet test src/Zipper.Tests/Zipper.Tests.csproj -c Release --no-build --logger "console;verbosity=normal"

      # Publish self-contained per platform
      - name: Publish self-contained binary
        shell: bash
        run: |
          dotnet publish src/Zipper.csproj -c Release -r ${{ matrix.platform }} \
            --self-contained true -o publish/${{ matrix.platform }} \
            -p:Version=${{ needs.prepare.outputs.version }} --no-restore
          rm -f publish/${{ matrix.platform }}/*.pdb

          case "${{ matrix.platform }}" in
            win-x64)   mv publish/${{ matrix.platform }}/Zipper.exe publish/${{ matrix.platform }}/zipper-win-x64.exe ;;
            linux-x64) mv publish/${{ matrix.platform }}/Zipper     publish/${{ matrix.platform }}/zipper-linux-x64 ;;
            osx-arm64) mv publish/${{ matrix.platform }}/Zipper     publish/${{ matrix.platform }}/zipper-osx-arm64 ;;
          esac

      # Full E2E suite runs on every OS (no shortcuts)
      - name: Run full E2E suite
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            ./tests/run-tests.bat
          else
            bash ./tests/run-tests.sh
          fi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: zipper-${{ matrix.platform }}
          path: publish/${{ matrix.platform }}
          retention-days: 7

  tag-and-release:
    needs: [prepare, lint, build-and-test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]')
    permissions:
      contents: write
      pull-requests: read
      models: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts

      - name: Bump and Tag
        id: tag_step
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          LATEST_TAG=$(git tag -l 'v*' | sort -V | tail -1)
          if [[ -z "$LATEST_TAG" ]]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "Latest tag: $LATEST_TAG"

          VERSION=${LATEST_TAG#v}
          IFS='.' read -r major minor patch <<< "$VERSION"

          if [[ -z "$major" || -z "$minor" || -z "$patch" ]]; then
             echo "Could not parse version: $VERSION"
             major=0
             minor=0
             patch=0
          fi

          NEW_PATCH=$((patch + 1))
          NEW_TAG="v$major.$minor.$NEW_PATCH"

          echo "New tag: $NEW_TAG"

          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag $NEW_TAG already exists, skipping"
            exit 0
          fi

          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "prev_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

      - name: Extract PR Release Notes
        id: pr_notes
        if: steps.tag_step.outputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          # Passed via env to avoid template injection in bash (step output could contain $() etc.)
          PREV_TAG_FROM_STEP: ${{ steps.tag_step.outputs.prev_tag }}
        shell: bash
        run: |
          set -eo pipefail

          # Try commits API (works for merge + squash strategies).
          # Content stays in a file — never interpolated into shell (injection guard).
          gh api "repos/${REPO}/commits/${COMMIT_SHA}/pulls" \
            --jq '(.[0] // {}) | .body // ""' > /tmp/pr_body.txt 2>/dev/null || true

          # Rebase-merge fallback: rebased commits have new SHAs not tracked by the
          # commits API. Extract PR number from PR-specific patterns only — avoiding
          # issue references like "Fixes #123" which use the same #N syntax.
          if [[ ! -s /tmp/pr_body.txt ]]; then
            SUBJECT=$(git log -1 --format="%s")
            BODY=$(git log -1 --format="%b")
            # Squash pattern: "My PR title (#42)" — number in trailing parens
            PR_NUM=$(printf '%s\n' "$SUBJECT" | sed -nE 's/.*\(#([0-9]+)\)$/\1/p' | head -1 || true)
            if [[ -z "$PR_NUM" ]]; then
              # Merge pattern: "Merge pull request #42 from ..."
              PR_NUM=$(printf '%s\n%s\n' "$SUBJECT" "$BODY" | sed -nE 's/^Merge pull request #([0-9]+).*/\1/p' | head -1 || true)
            fi
            if [[ -n "$PR_NUM" ]]; then
              gh api "repos/${REPO}/pulls/${PR_NUM}" \
                --jq '.body // ""' > /tmp/pr_body.txt 2>/dev/null || true
            fi
          fi

          # Extract ## Release Notes section. awk state machine strips multi-line
          # HTML comments (<!-- ... -->) including their interior lines.
          # grep exits 1 on zero matches — || true is required, not defensive noise.
          NOTES=$(awk '
            /^## Release Notes/           { found=1; next }
            found && /^## /               { exit }
            found && /<!--/               { in_comment=1 }
            found && /-->/                { in_comment=0; next }
            found && !in_comment          { print }
          ' /tmp/pr_body.txt |
            sed '/^[[:space:]]*$/d; s/^[[:space:]]*//; s/[[:space:]]*$//' || true)

          # Pattern match handles italics/asterisk variants of the sentinel
          # (_Auto-generated by CI._ or *Auto-generated by CI.*).
          if [[ -n "$NOTES" ]] && ! echo "$NOTES" | grep -qi "auto-generated by ci"; then
            # Random delimiter prevents injection if NOTES contains "EOF" on its own line.
            DELIM=$(openssl rand -hex 16)
            printf 'body<<%s\n%s\n%s\n' "$DELIM" "$NOTES" "$DELIM" >> "$GITHUB_OUTPUT"
            echo "use_ai=false" >> "$GITHUB_OUTPUT"
          else
            echo "use_ai=true" >> "$GITHUB_OUTPUT"
            # Use prev_tag passed via env (avoids re-sorting all tags).
            # v0.0.0 is synthetic (no real prior tag) — fall back to initial commit.
            PREV_TAG="${PREV_TAG_FROM_STEP:-}"
            [[ -z "$PREV_TAG" || "$PREV_TAG" == "v0.0.0" ]] && \
              PREV_TAG=$(git rev-list --max-parents=0 HEAD)
            COMMIT_LOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" | head -50 || true)
            DELIM=$(openssl rand -hex 16)
            printf 'commit_log<<%s\n%s\n%s\n' "$DELIM" "$COMMIT_LOG" "$DELIM" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Release Notes via AI
        id: ai_notes
        if: steps.tag_step.outputs.tag != '' && steps.pr_notes.outputs.use_ai == 'true'
        continue-on-error: true
        uses: actions/ai-inference@a7805884c80886efc241e94a5351df715968a0ad # v2.1.1
        with:
          model: openai/gpt-4o-mini
          prompt: |
            Summarize these git commits as 1-3 plain prose sentences for a developer changelog. Key facts only. No fluff. No marketing language.

            Commits:
            ${{ steps.pr_notes.outputs.commit_log }}

      - name: Create Release
        if: steps.tag_step.outputs.tag != ''
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag_step.outputs.tag }}
          name: Release ${{ steps.tag_step.outputs.tag }}
          body: ${{ steps.pr_notes.outputs.body || (steps.ai_notes.outcome == 'success' && steps.ai_notes.outputs.response) || 'See commit history for changes in this release.' }}
          draft: false
          prerelease: false
          files: |
            artifacts/zipper-win-x64/zipper-win-x64.exe
            artifacts/zipper-linux-x64/zipper-linux-x64
            artifacts/zipper-osx-arm64/zipper-osx-arm64
